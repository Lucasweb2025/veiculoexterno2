<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel L.A. Controle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-10 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-blue-500">L.A. Controle</h1>
            <button onclick="window.location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                Atualizar
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-lg font-semibold text-gray-400">Veículos no Pátio</h2>
            <span id="contador" class="bg-gray-800 text-blue-400 px-3 py-1 rounded-full text-xs font-bold border border-blue-500/30">
                Verificando...
            </span>
        </div>

        <div id="lista-veiculos" class="space-y-4">
            <p class="text-center text-gray-500 mt-10">Conectando ao banco de dados...</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configurações extraídas da sua imagem image_f4c841.png
        const firebaseConfig = {
            apiKey: "AIzaSyB4wDK8VddBeO0rfndLd7LemSGDPupKjF0",
            authDomain: "la-controle.firebaseapp.com",
            databaseURL: "https://la-controle-default-rtdb.firebaseio.com",
            projectId: "la-controle",
            storageBucket: "la-controle.firebasestorage.app",
            messagingSenderId: "847252305513",
            appId: "1:847252305513:web:d2caa9b0404806ea8794f8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ATENÇÃO: Se o nome da sua coleção no Firebase não for "veiculos", mude a palavra abaixo
        const colecaoNome = "veiculos"; 

        const q = query(collection(db, colecaoNome));

        onSnapshot(q, (snapshot) => {
            const listaElement = document.getElementById("lista-veiculos");
            const contadorElement = document.getElementById("contador");
            
            listaElement.innerHTML = "";
            contadorElement.innerText = `${snapshot.size} REGISTROS`;

            if (snapshot.empty) {
                listaElement.innerHTML = `<p class="text-center text-gray-500 mt-10">Nenhum veículo encontrado na coleção "${colecaoNome}". Verifique se o nome da coleção está correto no Firebase.</p>`;
                return;
            }

            snapshot.forEach((doc) => {
                const v = doc.data();
                const card = `
                    <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 shadow-sm">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="text-blue-500 font-bold text-lg tracking-wider">${v.placa ? v.placa.toUpperCase() : 'SEM PLACA'}</div>
                                <div class="text-gray-100 font-medium text-base">${v.modelo || 'Modelo não informado'}</div>
                                <div class="text-gray-500 text-xs mt-1">Status: ${v.status || 'Registrado'}</div>
                            </div>
                        </div>
                    </div>
                `;
                listaElement.innerHTML += card;
            });
        }, (error) => {
            console.error("Erro ao buscar dados:", error);
            document.getElementById("lista-veiculos").innerHTML = `<p class="text-center text-red-500 mt-10">Erro de Permissão: Verifique as 'Rules' no console do Firebase.</p>`;
        });
    </script>
</body>
</html>
