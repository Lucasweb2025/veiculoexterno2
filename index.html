<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L.A. Controle - Painel de Veículos</title>
    <!-- Tailwind CSS para visual profissional e responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <!-- Cabeçalho -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-10 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-blue-500">L.A. Controle</h1>
            <button onclick="window.location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                Atualizar
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <!-- Status e Contador -->
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-lg font-semibold text-gray-400">Veículos no Pátio</h2>
            <span id="contador" class="bg-gray-800 text-blue-400 px-3 py-1 rounded-full text-xs font-bold border border-blue-500/30">
                Sincronizando...
            </span>
        </div>

        <!-- Lista de Veículos -->
        <div id="lista-veiculos" class="space-y-4">
            <div class="text-center py-10">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
                <p class="text-gray-500">Buscando dados da L.A. Custom...</p>
            </div>
        </div>
    </main>

    <!-- Firebase SDK Modular -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Configurações extraídas do seu console (la-controle)
        const firebaseConfig = {
            apiKey: "AIzaSyB4wDK8VddBeO0rfndLd7LemSGDPupKjF0",
            authDomain: "la-controle.firebaseapp.com",
            databaseURL: "https://la-controle-default-rtdb.firebaseio.com",
            projectId: "la-controle",
            storageBucket: "la-controle.firebasestorage.app",
            messagingSenderId: "847252305513",
            appId: "1:847252305513:web:d2caa9b0404806ea8794f8"
        };

        // Inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Referência ao nó 'vehicles' (confirmado na sua imagem image_f453bb.png)
        const veiculosRef = ref(db, 'vehicles');

        // Escuta os dados em tempo real
        onValue(veiculosRef, (snapshot) => {
            const data = snapshot.val();
            const listaElement = document.getElementById("lista-veiculos");
            const contadorElement = document.getElementById("contador");
            
            listaElement.innerHTML = "";
            
            if (!data) {
                contadorElement.innerText = "0 VEÍCULOS";
                listaElement.innerHTML = `
                    <div class="text-center bg-gray-800 border border-dashed border-gray-700 rounded-xl p-10">
                        <p class="text-gray-500">Nenhum veículo encontrado no sistema.</p>
                    </div>`;
                return;
            }

            // Converte o objeto do Firebase em array e inverte para ver os novos primeiro
            const entries = Object.entries(data);
            contadorElement.innerText = `${entries.length} VEÍCULOS`;

            entries.reverse().forEach(([id, v]) => {
                // Formatação simples da data se existir
                const horaStr = v.dataHora ? new Date(v.dataHora).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) : '';

                const card = `
                    <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 shadow-sm hover:border-blue-500/50 transition duration-300">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="text-blue-500 font-bold text-xl tracking-widest">${v.placa ? v.placa.toUpperCase() : 'SEM PLACA'}</div>
                                <div class="text-gray-100 font-semibold text-lg mt-1">${v.modelo || 'Modelo não informado'}</div>
                                ${horaStr ? `<div class="text-gray-500 text-xs mt-2 font-medium">Entrada: ${horaStr}</div>` : ''}
                            </div>
                            <div class="flex flex-col items-end">
                                <span class="px-3 py-1 bg-green-500/10 text-green-500 rounded-full text-[10px] font-bold uppercase tracking-wider border border-green-500/20 shadow-sm">
                                    ${v.status || 'No Pátio'}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
                listaElement.innerHTML += card;
            });
        }, (error) => {
            console.error(error);
            document.getElementById("lista-veiculos").innerHTML = `
                <div class="bg-red-500/10 border border-red-500/50 p-4 rounded-lg text-red-500 text-center">
                    Erro ao conectar: Verifique as permissões do Realtime Database.
                </div>`;
        });
    </script>
</body>
</html>
