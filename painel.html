<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L.A. GESTÃO - TELEMETRIA CLOUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --orange: #f39c12; }
        body { background: #000; font-family: -apple-system, sans-serif; color: white; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; }
        #mapa-modal { height: 400px; width: 100%; border-radius: 15px; border: 1px solid var(--orange); }
        .modal-overlay { background: rgba(0,0,0,0.9); display: none; position: fixed; top:0; left:0; width:100%; height:100%; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="min-h-screen p-4">

    <!-- Modal do Mapa (Oculto por padrão) -->
    <div id="overlay" class="modal-overlay">
        <div class="w-full max-w-2xl bg-zinc-900 p-6 rounded-3xl relative">
            <button onclick="fecharMapa()" class="absolute -top-10 right-0 text-white font-bold uppercase text-xs">Fechar [X]</button>
            <h3 id="modal-titulo" class="text-[--orange] font-black uppercase mb-4 italic">Trajeto da Viagem</h3>
            <div id="mapa-modal"></div>
        </div>
    </div>

    <header class="max-w-5xl mx-auto mb-8 flex justify-between items-center border-b border-white/10 pb-6">
        <div>
            <img src="https://i.ibb.co/27cxGcb1/lacustomlogotipo.png" class="h-10 mb-2">
            <h1 class="text-[--orange] font-black text-sm uppercase tracking-tighter italic">Gestão de Telemetria</h1>
        </div>
        <button onclick="window.location.reload()" class="bg-zinc-900 border border-white/10 px-4 py-2 rounded-xl text-xs font-bold">F5</button>
    </header>

    <main class="max-w-3xl mx-auto space-y-6">
        
        <section>
            <h2 class="text-zinc-500 text-[10px] font-black uppercase tracking-widest mb-4 ml-2">Histórico de Movimentação</h2>
            <div id="lista-viagens" class="space-y-3">
                <!-- Preenchido via Firebase -->
            </div>
        </section>

    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB4wDK8VddBeOOrfndLd7LemSGDPupKjF0",
            authDomain: "la-controle.firebaseapp.com",
            databaseURL: "https://la-controle-default-rtdb.firebaseio.com",
            projectId: "la-controle",
            storageBucket: "la-controle.firebasestorage.app",
            messagingSenderId: "847252305513",
            appId: "1:847252305513:web:d2caa9b0404806ea8794f8"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let map, polyline;

        db.ref('trips').on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('lista-viagens');
            container.innerHTML = "";

            if (!data) return;

            Object.entries(data).reverse().forEach(([id, trip]) => {
                const pathData = JSON.stringify(trip.path || []);
                container.innerHTML += `
                    <div class="card border-l-2 border-l-zinc-700 hover:border-l-[--orange] transition-all">
                        <div class="flex justify-between items-center">
                            <div>
                                <div class="text-[#f39c12] font-black text-lg">${trip.car || '---'}</div>
                                <div class="text-white font-bold text-sm uppercase">${trip.driver}</div>
                                <div class="text-zinc-500 text-[10px] mt-1">${trip.date}</div>
                            </div>
                            <div class="text-right flex flex-col items-end gap-2">
                                <div class="text-white font-black text-lg">+${trip.km} KM</div>
                                <button onclick='abrirMapa(${pathData}, "${trip.car}")' class="bg-[--orange] text-black text-[10px] font-black px-3 py-1 rounded uppercase">Ver Rota</button>
                            </div>
                        </div>
                    </div>`;
            });
        });

        function abrirMapa(path, car) {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('modal-titulo').innerText = `Rota: ${car}`;

            if (!map) {
                map = L.map('mapa-modal', { zoomControl: false }).setView([-23.55, -46.63], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            }

            if (polyline) map.removeLayer(polyline);

            if (path && path.length > 0) {
                polyline = L.polyline(path, {color: '#f39c12', weight: 4}).addTo(map);
                map.fitBounds(polyline.getBounds());
            }
            
            setTimeout(() => map.invalidateSize(), 300);
        }

        function fecharMapa() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
