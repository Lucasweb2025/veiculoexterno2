<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - L.A. Custom</title>
    <!-- Tailwind CSS para um visual moderno sem precisar de arquivo CSS separado -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <!-- Cabeçalho -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-10 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">L.A. <span class="text-blue-500">Custom</span></h1>
            <button onclick="window.location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                Atualizar
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-lg font-semibold text-gray-400">Veículos no Pátio</h2>
            <span id="contador" class="bg-gray-800 text-blue-400 px-3 py-1 rounded-full text-xs font-bold border border-blue-500/30">
                Carregando...
            </span>
        </div>

        <!-- Lista de Veículos -->
        <div id="lista-veiculos" class="space-y-4">
            <!-- Os cards dos veículos entrarão aqui via JavaScript -->
            <div class="animate-pulse flex space-x-4">
                <div class="flex-1 space-y-4 py-1">
                    <div class="h-4 bg-gray-700 rounded w-3/4"></div>
                    <div class="space-y-2">
                        <div class="h-4 bg-gray-700 rounded"></div>
                        <div class="h-4 bg-gray-700 rounded w-5/6"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts do Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // IMPORTANTE: Substitua pelos dados do seu projeto Firebase
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJETO_ID",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "ID_MESSAGING",
            appId: "SEU_APP_ID"
        };

        // Inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Referência da coleção (use o mesmo nome que você usou no index.html)
        const veiculosRef = collection(db, "veiculos");
        const q = query(veiculosRef, orderBy("dataHora", "desc"));

        // Função para atualizar a tela em tempo real
        onSnapshot(q, (snapshot) => {
            const listaElement = document.getElementById("lista-veiculos");
            const contadorElement = document.getElementById("contador");
            
            listaElement.innerHTML = "";
            contadorElement.innerText = `${snapshot.size} VEÍCULOS`;

            if (snapshot.empty) {
                listaElement.innerHTML = `<p class="text-center text-gray-500 mt-10">Nenhum veículo encontrado no momento.</p>`;
                return;
            }

            snapshot.forEach((doc) => {
                const v = doc.data();
                const dataFormatada = v.dataHora ? new Date(v.dataHora).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) : '--:--';

                const card = `
                    <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 shadow-sm hover:border-blue-500/50 transition">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="text-blue-500 font-bold text-lg tracking-wider">${v.placa ? v.placa.toUpperCase() : 'SEM PLACA'}</div>
                                <div class="text-gray-100 font-medium text-base">${v.modelo || 'Modelo não informado'}</div>
                                <div class="text-gray-500 text-xs mt-1">Entrada: ${dataFormatada}</div>
                            </div>
                            <div class="flex flex-col items-end">
                                <span class="px-2 py-1 bg-green-500/10 text-green-500 rounded text-[10px] font-bold uppercase tracking-widest border border-green-500/20">
                                    No Pátio
                                </span>
                            </div>
                        </div>
                    </div>
                `;
                listaElement.innerHTML += card;
            });
        });
    </script>
</body>
</html>
